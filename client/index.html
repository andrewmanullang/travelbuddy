<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Buddy - Your Personal Trip Assistant</title>
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.8/purify.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #f8fafc;
      color: #0f172a;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #cbd5e1 #f1f5f9;
    }

    .chat-container::-webkit-scrollbar {
      width: 6px;
    }

    .chat-container::-webkit-scrollbar-track {
      background: #f1f5f9;
    }

    .chat-container::-webkit-scrollbar-thumb {
      background-color: #cbd5e1;
      border-radius: 20px;
    }

    .message-animate {
      animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .typing-dots span {
      animation: blink 1.4s infinite both;
      height: 6px;
      width: 6px;
      background-color: #64748b;
      display: inline-block;
      border-radius: 50%;
      margin: 0 2px;
    }

    .typing-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes blink {
      0% {
        opacity: 0.2;
      }

      20% {
        opacity: 1;
      }

      100% {
        opacity: 0.2;
      }
    }

    .glass-header {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(226, 232, 240, 0.8);
    }
  </style>
</head>

<body>

  <header class="p-4 glass-header sticky top-0 z-10 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div
        class="w-11 h-11 rounded-xl bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center shadow-lg shadow-emerald-500/20">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-white" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path
            d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z" />
        </svg>
      </div>
      <div>
        <h1 class="font-bold text-slate-900 leading-tight">Travel Buddy</h1>
        <p class="text-[11px] font-medium text-emerald-600 uppercase tracking-wider">Expert Explorer AI</p>
      </div>
    </div>
    <button id="clearChat" class="p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-lg transition-all"
      title="Clear Chat">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
      </svg>
    </button>
  </header>

  <main id="chatContainer" class="chat-container p-4 md:p-6 space-y-6">
    <div class="flex gap-4 max-w-3xl message-animate">
      <div class="w-9 h-9 rounded-full bg-emerald-100 flex-shrink-0 flex items-center justify-center text-emerald-600">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>
      <div class="bg-white p-4 rounded-2xl rounded-tl-none text-slate-700 shadow-sm border border-slate-200">
        <p class="font-semibold text-slate-900 mb-1">Welcome back, Traveler! 🌍</p>
        Ready to plan your next adventure? Ask me for hidden gems, custom itineraries, or budget tips.
      </div>
    </div>
  </main>

  <footer class="p-4 bg-white border-t border-slate-200">
    <form id="chatForm" class="max-w-4xl mx-auto flex items-center gap-3">
      <div class="relative flex-1">
        <input type="text" id="userInput" autocomplete="off" placeholder="Where to next? (e.g. 5 days in Tokyo)"
          class="w-full bg-slate-50 border border-slate-200 text-slate-900 rounded-2xl py-3.5 px-5 pr-12 focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all placeholder:text-slate-400">
      </div>
      <button type="submit" id="sendBtn"
        class="bg-emerald-600 hover:bg-emerald-700 text-white p-3.5 rounded-2xl transition-all shadow-md shadow-emerald-600/10 disabled:opacity-50">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
        </svg>
      </button>
    </form>
    <p class="text-[10px] text-center text-slate-400 mt-3 font-medium uppercase tracking-tighter">Powered by Travel
      Buddy AI</p>
  </footer>

  <!-- External JavaScript file -->
  <script src="script.js"></script>
</body>

</html>
